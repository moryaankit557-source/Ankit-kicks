<html>
<head>
<style>

 body{
font-family: Arial;
background-color: rgb(165, 109, 109);
padding: 40px;
background-image: url(design\ -\ Copy.jpeg);
background-size: cover;
background-repeat: no-repeat;
background-position: center;
}

 .container{
max-width:900px;
margin:auto;
background: rgba(135, 206, 235, 0.6);
padding:30px;
 box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
}


h2{
margin-bottom:20px;
color: brown;
}

.section{
margin-bottom:4px;
color:;
}

input,select{
width:70%;
padding:15px;
margin-top:10px;
margin-bottom:15px;
border:3px solid blue;
border-radius:0;
}

.row{
display:flex;
gap:20px;
}

.row div{
flex:1;
}

.payment-method{
border:2px solid black;
padding:15px;
margin-bottom:15px;
border-radius:0px;
}

.qr{
text-align:center;
margin-top:10px;
}

.qr img{
width:200px;
height: 400px;;
}

button{
width:100%;
padding:15px;
background:black;
color:white;
border:none;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:solid blue;
}
 

</style>
</head>
<body>

<div class="container">
<h2>Payment</h2>


<div class="section">
<h3>Delivery Address</h3>


<input type="text" placeholder="Full Name">
<input type="text" placeholder="Mobile Number">
<input type="text" placeholder="Address Line">
<input type="text" placeholder="Address Line 2">
<div class="row">
<div>
    <input type="text" placeholder="City">
</div>

<div>
<input type="text" placeholder="Pincode">
</div>
</div>
</div>

<div class="section">
<h3>Select Payment Method</h3>
<div class="payment-method"><label>
<input type="radio" name="pay" onclick="showUPI()">
 <img src="phonepay.webp"height="80px" width="80px">
  
 <img src="G,pay.png"height="80px" width="80px">UPI
</label>

<div class="qr" id="upiBox" style="display:none">
<p>Scan QR to Pay</p>
<img src="QR.jpeg">
<p>UPI ID:8920105524@fam</p>
</div>
</div>


<div class="payment-method">
<label>
<input type="radio" name="pay" onclick="showCard()"> 
<img src="card.png"height="120px" width="120px"> Credit Card
</label>
<div id="cardBox" style="display:none">
<input type="text" placeholder="Card Number">
<div class="row">
<div>
<input type="text" placeholder="Expiry MM/YY">
</div>
<div>
<input type="text" placeholder="CVV">
</div>
</div>
<input type="text" placeholder="Card Holder Name">
</div>
</div>
<div class="payment-method">
<label>
<input type="radio" name="pay"> <img src="cash,on.png!bw700"height="90px" width="90px"> Cash on Delivery
</label>
</div>
</div>
<button onclick="placeOrder()">Place Order</button>
</div>
<script>
function showUPI(){
document.getElementById("upiBox").style.display="block";
document.getElementById("cardBox").style.display="none";
}

function showCard(){
document.getElementById("cardBox").style.display="block";
document.getElementById("upiBox").style.display="none";
}

function placeOrder(){
alert("Payment Successful ✅");
localStorage.removeItem("cart");
window.location.href="seccess.html";
}

</script>

</body>
</html>
