 
<html>
<head>

<title>Order Successful</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
}

.box{
background:white;
padding:50px;
border-radius:15px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
animation:popup 0.6s ease;
}

@keyframes popup{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* Tick Animation */

.checkmark{
width:80px;
height:80px;
border-radius:50%;
background:#4CAF50;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
animation:pop 0.5s ease;
}

.checkmark span{
color:white;
font-size:40px;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

h2{
margin-top:20px;
color:#333;
}

p{
color:#666;
}

/* Button */

button{
margin-top:25px;
padding:12px 25px;
background:#000;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#4CAF50;
transform:scale(1.1);
}

.order{
margin-top:15px;
font-weight:bold;
color:#444;
}

.delivery{
color:#777;
margin-top:5px;
}

</style>

</head>

<body>

<div class="box">

<div class="checkmark">
<span>✔</span>
</div>

<h2>Order Placed Successfully</h2>

<p>Thank you for shopping with us!</p>

<div class="order" id="orderId"></div>

<div class="delivery" id="deliveryDate"></div>

<button onclick="window.location.href='index.html'">
Continue Shopping
</button>

</div>


<script>

/* Random Order ID */

let orderNumber = "ORD" + Math.floor(Math.random()*1000000);

document.getElementById("orderId").innerText =
"Order ID: " + orderNumber;


/* Delivery Date */

let today = new Date();
today.setDate(today.getDate()+5);

document.getElementById("deliveryDate").innerText =
"Estimated Delivery: " + today.toDateString();

</script>

</body>
</html>
