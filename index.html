 <!-- INDEX.HTML -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANKIT KICKS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif}

body{background:#f5f5f5}

header{
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:100
}

.logo{font-size:26px;font-weight:bold}

nav a{
margin:0 15px;
text-decoration:none;
color:#000;
font-weight:600
}

.hero{
display:grid;
grid-template-columns:1fr 1fr;
min-height:80vh
}

.hero img{
width:100%;
height:100%;
object-fit:cover
}

.hero-text{
background:#d6ff3f;
display:flex;
align-items:center;
justify-content:center;
padding:40px
}

.hero-text div{max-width:400px}

.hero-text h1{
font-size:48px;
margin-bottom:20px
}

.hero-text p{
font-size:18px;
line-height:1.6
}

.section{
padding:60px 40px
}

.section h2{
margin-bottom:30px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
transition:.3s
}

.card:hover{transform:translateY(-5px)}

.card img{
width:100%;
height:220px;
object-fit:cover
}

.card-body{padding:15px}

.card-body h3{margin-bottom:10px}

.btn{
margin-top:10px;
background:black;
color:white;
padding:10px 15px;
border:none;
cursor:pointer
}

footer{
background:#111;
color:#fff;
text-align:center;
padding:25px;
margin-top:40px
}

/* TABLET */
@media (max-width:1024px){
.hero-text h1{font-size:36px}
}

/* MOBILE */
@media (max-width:768px){

header{
flex-direction:column;
gap:10px
}

.hero{
grid-template-columns:1fr
}

.hero-text{
text-align:center
}

.hero-text h1{font-size:32px}

.section{
padding:40px 20px
}

}
</style>
</head>

<body>

<header>
<div class="logo">ANKIT KICKS</div>

<nav>
<a href="index.html">Home</a>
<a href="men.html">Men</a>
<a href="women.html">Women</a>
<a href="cart.html">Cart 🛒</a>
</nav>
</header>

<section class="hero">
<img src="design - Copy.jpeg">

<div class="hero-text">
<div>
<h1>New Arrivals</h1>
<p>The latest styles and limited edition sneakers available now.</p>
</div>
</div>
</section>

<section class="section">
<h2>Popular Sneakers</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<div class="card-body">
<h3>Running Shoes</h3>
<p>₹2999</p>
<button class="btn">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1528701800489-20be9c9e1c61">
<div class="card-body">
<h3>Sport Sneakers</h3>
<p>₹3499</p>
<button class="btn">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<div class="card-body">
<h3>Street Style</h3>
<p>₹2799</p>
<button class="btn">Add to Cart</button>
</div>
</div>

</div>
</section>

<footer>
© 2026 ANKIT KICKS
</footer>

</body>
</html>
