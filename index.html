<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <style>


/* MOBILE RESPONSIVE */

@media (max-width:768px){

header{
flex-direction:column;
gap:10px;
text-align:center;
padding:15px;
}

.hero{
flex-direction:column;
height:auto;
}

.hero-img{
width:100%;
}

.hero-img img{
height:auto;
}

.hero-content{
width:100%;
padding:30px;
}

.content-box h1{
font-size:32px;
}

.content-box p{
font-size:16px;
}

.footer{
flex-direction:column;
gap:10px;
text-align:center;
padding:20px;
}

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

 
header{
    background:white;
    padding:15px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid white;
}

.nav-left a,
.nav-right a{
    margin:0 12px;
    text-decoration:none;
    color:black;
    font-weight:600;
    font-size:14px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
}

 
.hero{
    display:flex;
    height:80vh;
    position:relative;
    overflow:hidden;
}

 
.hero-img{
    width:65%;
}

.hero-img img{
    width:100%;
    height:130%;
    object-fit:cover;
}
 
.hero-content{
    width:35%;
    background:greenyellow;
    color:w;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
    position:relative;
}

 
.hero-content::before{
    content:"";
    position:absolute;
    left:-120px;
    top:0;
    width:0;
    height:100%;
     
    border-radius:50%;
}

 
.content-box{
    position:relative;
    text-align:center;
}

.content-box h1{
    font-size:48px;
    margin-bottom:20px;
}

.content-box p{
    font-size:18px;
    line-height:1.6;
}

 
.footer{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    background:white;
    font-weight:bold;
    letter-spacing:2px;
}
</style>
</head>

<body>

<header>
    <div class="nav-left">
        <a href="men.html">MEN Collection</a>
        <a href="women.html">WOMEN Collection</a>
        
    </div>

    <div class="logo">ANKIT KICKS</div>

    <div class="nav-right">
          <a href="cart.html">🛒</a>
    </div>
</header>

<section class="hero">
    <div class="hero-img">
        <img src="design - Copy.jpeg" alt="Shoes">
    </div>

    <div class="hero-content">
        <div class="content-box">
            <h1>New Arrivals</h1>
            <p>
                The latest styles and limited-edition colors  
                that you can only find here (while they last, that is).
            </p>
        </div>
    </div>
</section>

<div class="footer">
    <div>MEN'S NEW ARRIVALS</div>
    <div>WOMEN'S NEW ARRIVALS</div>
</div>

</body>
</html>
